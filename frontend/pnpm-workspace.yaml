# pnpm settings. Since pnpm 11, these live here instead of the package.json
# "pnpm" field (which pnpm 11 silently ignores).

# CVE-pinning overrides for transitive dependencies.
overrides:
  minimatch: '>=10.2.1'
  picomatch: '>=4.0.4'
  brace-expansion: '>=5.0.6'
  dompurify: '>=3.4.11'
  protobufjs: '>=8.6.0'
  js-cookie: '>=3.0.7'
  esbuild: '>=0.28.1'
  vite: '^7.3.5'
  '@babel/core': '>=7.29.6'
  markdown-it: '>=14.2.0'
  '@opentelemetry/core': '>=2.8.0'
  linkify-it: '>=5.0.1'

# pnpm 11 ignores dependency build scripts unless explicitly allowed here.
allowBuilds:
  esbuild: true # fetches its platform binary — required for the vite build
  '@clerk/shared': true
  core-js: false # postinstall is only a funding notice